<!DOCTYPE html>
<html>
<head>
    <title>Register - Bristol Food Network</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f7f7f7;
            text-align:center;
        }

        .container{
            padding:60px 20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            max-width:500px;
            margin:0 auto;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        h2{
            margin-top:0;
        }

        .btn-group{
            display:flex;
            flex-direction:column;
            gap:15px;
            margin-top:20px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
            color:white;
        }

        .producer-btn{
            background:#2563eb;
        }

        .customer-btn{
            background:#16a34a;
        }

        button:hover{
            filter:brightness(0.95);
        }

        .footer-link{
            margin-top:20px;
        }

        .footer-link a{
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>

<body>

{% include "navbar.html" %}

<div class="container">
    <div class="card">
        <h2>Register</h2>
        <p>Select how you would like to join the network:</p>

        <form method="post">
            {% csrf_token %}
            <div class="btn-group">
                <button type="submit" name="user_type" value="producer" class="producer-btn">
                    Register as Producer
                </button>

                <button type="submit" name="user_type" value="customer" class="customer-btn">
                    Register as Customer
                </button>
            </div>
        </form>

        <div class="footer-link">
            Already have an account?
            <a href="/login/">Login here</a>
        </div>
    </div>
</div>

</body>
</html>
