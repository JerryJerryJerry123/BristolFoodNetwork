<!DOCTYPE html>
<html>
<head>
    <title>Login - Bristol Food Network</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f7f7f7;
            text-align:center;
        }

        .container{
            padding:60px 20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            max-width:400px;
            margin:0 auto;
            text-align:left;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        h2{
            margin-top:0;
            text-align:center;
        }

        form p{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #d1d5db;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            filter:brightness(0.95);
        }

        .footer-link{
            margin-top:15px;
            text-align:center;
        }

        .footer-link a{
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>

<body>
{% include "navbar.html" %}

<div class="container">
    <div class="card">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>

        <div class="footer-link">
            Don't have an account?
            <a href="/register/">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
