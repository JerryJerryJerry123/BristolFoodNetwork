<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f3f4f6;
        }

        nav{
            background:#1f2937;
            padding:15px;
            color:white;
            display:flex;
            justify-content:space-between;
        }

        .container{
            max-width:800px;
            margin:40px auto;
            padding:0 20px;
        }

        h1{
            margin-bottom:20px;
        }

        .notification{
            background:white;
            padding:18px;
            border-radius:12px;
            margin-bottom:15px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
            transition:0.2s;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .notification:hover{
            transform:translateY(-2px);
        }

        .notification.unread{
            border-left:5px solid #3b82f6;
            background:#eff6ff;
        }

        .message{
            font-size:15px;
            margin-bottom:5px;
        }

        .time{
            font-size:12px;
            color:#6b7280;
        }

        .badge{
            background:#3b82f6;
            color:white;
            padding:4px 10px;
            border-radius:999px;
            font-size:12px;
        }

        .empty{
            text-align:center;
            color:#6b7280;
            margin-top:40px;
        }
    </style>
</head>

<body>

{% include "navbar.html" %}

<div class="container">
    <h1>🔔 Notifications</h1>

    {% for notification in notifications %}
        <div class="notification {% if not notification.is_read %}unread{% endif %}">
            <div>
                <div class="message">
                    {{ notification.message }}
                </div>
                <div class="time">
                    {{ notification.created_at|date:"M d, Y H:i" }}
                </div>
            </div>

            {% if not notification.is_read %}
                <span class="badge">New</span>
            {% endif %}

        </div>
    {% empty %}
        <div class="empty">
            <p>No notifications yet.</p>
        </div>
    {% endfor %}
</div>

</body>
</html>
