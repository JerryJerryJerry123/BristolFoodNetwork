<!DOCTYPE html>
<html>
<head>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f7f7f7;
            text-align:center;
        }

        h1{
            margin-top:30px;
        }

        a button{
            padding:10px 14px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
        }

        a button:hover{
            filter:brightness(0.95);
        }

        table{
            background:white;
            border-radius:12px;
            margin:auto;
            padding:10px;
            border-collapse:collapse;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
            overflow:hidden;
        }

        th{
            background:#f3f4f6;
            padding:12px;
            text-align:left;
        }

        td{
            padding:12px;
            border-top:1px solid #e5e7eb;
        }

        tr:hover{
            background:#f9fafb;
        }

        th, td{
            border:none;
        }

        td button{
            padding:6px 10px;
            border:none;
            border-radius:8px;
            background:#10b981;
            color:white;
            cursor:pointer;
        }

        td button:hover{
            filter:brightness(0.95);
        }
    </style>

</head>

<body>

{% include "navbar.html" %}

<h1>Product Management Dashboard</h1>

<a href="/marketplace/">
    <button style="margin-bottom:20px;">⬅ Back to Marketplace</button>
</a>

<table border="1" style="margin:auto;">
<tr>
    <th>Product</th>
    <th>Stock</th>
    <th>Status</th>
    <th>Edit</th>
</tr>

{% for product in products %}
<tr>
    <td>{{ product.name }}</td>
    <td>{{ product.quantity }} {{ product.unit }}</td>
    <td>{{ product.get_status_display }}</td>
    <td>
        <a href="{% url 'edit_product' product.id %}">
            <button>Edit / Update Stock</button>
        </a>
    </td>
</tr>
{% endfor %}

</table>
