<!DOCTYPE html>
<html>
<head>
    <title>Write Review</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .rating {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .rating input {
            width: auto;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e4fd1;
        }
    </style>
</head>

<body>

{% include "navbar.html" %}


<div class="container">

    <div class="card">
        <h2>Write Review for {{ product.name }}</h2>

        <form method="post">
            {% csrf_token %}

            <label>Rating</label>
            <div class="rating">
                {% for i in "12345" %}
                    <label>
                        <input type="radio" name="rating" value="{{ i }}" required>
                        {{ i }}
                    </label>
                {% endfor %}
            </div>

            <label>Title</label>
            <input type="text" name="title" placeholder="Short summary..." required>

            <label>Review</label>
            <textarea name="text" placeholder="Write your review..." required></textarea>

            <button type="submit">Submit Review</button>
        </form>
    </div>

</div>

</body>
</html>
