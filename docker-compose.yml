

services:
  bfn_mysql:
    image: mysql:8.0
    container_name: bfn_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1324321
      MYSQL_DATABASE: bfn_db
      MYSQL_USER: bfn_user
      MYSQL_PASSWORD: bfn_password
    volumes:
      - bfn_db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5

  bfn_django:
    build: .
    container_name: bfn_django
    restart: always
    command: >
      sh -c "
      echo 'Waiting for MySQL...';
      until python -c 'import pymysql; pymysql.connect(host=\"bfn_mysql\", user=\"bfn_user\", password=\"bfn_password\", database=\"bfn_db\", port=3306)'; do
        echo 'MySQL not ready...';
        sleep 2;
      done;
      echo 'MySQL is ready!';
      python manage.py migrate;
      python manage.py runserver 0.0.0.0:8000;
      "
    depends_on:
      bfn_mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DB_HOST=bfn_mysql
      - DJANGO_DB_PORT=3306

volumes:
  bfn_db_data: